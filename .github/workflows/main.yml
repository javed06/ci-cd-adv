name: cicd with test case
on:
  push:
    branches:
      - main
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Unit Tests
        run: python -m pytest
      - name: create build artifact
        run: |
          mkdir build
          cp -r app build/
          zip -r python-app-build.zip build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app-build 
          path: python-app-build.zip

         

        
       

      
         
     
     
